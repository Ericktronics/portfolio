name: Deploy to S3
on:
  push:
    branches:
      - master

jobs: 
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build 

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1  
      - name: Deploy to S3
        run: |
          # Upload WebP images with correct Content-Type
          aws s3 sync ./dist/portfolio/ s3://henrick-portfolio \
            --exclude "*" --include "*.webp" \
            --content-type "image/webp"

          # Upload web app manifest with correct Content-Type
          aws s3 cp ./dist/portfolio/manifest.webmanifest s3://henrick-portfolio/manifest.webmanifest \
            --content-type "application/manifest+json"

          # Upload everything else (skip already-uploaded files handled above)
          aws s3 sync ./dist/portfolio/ s3://henrick-portfolio \
            --exclude "*.webp" --exclude "manifest.webmanifest" \
            --delete

      - name: Invalidate CloudFront Cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
