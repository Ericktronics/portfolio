<div class="ca">
    <div class="certificates" id="certified">
        <h2>Certificates</h2>
        <div class="certificates__main">
            <div class="img__cards">
                <picture>
                  <source srcset="../../assets/images/AWS_CP.webp" type="image/webp">
                  <img src="../../assets/images/AWS_CP.png" alt="AWS Certified Cloud Practitioner Badge" loading="lazy" />
                </picture>
                <h3>AWS Certified - Cloud Practitioner</h3>
            </div>
            <div class=" img__cards">
                <picture>
                  <source srcset="../../assets/images/AZ-900.webp" type="image/webp">
                  <img src="../../assets/images/AZ-900.png" alt="Microsoft Azure Fundamentals AZ-900 Badge" loading="lazy" />
                </picture>
                <h3>Microsoft Certified - Azure Fundamentals</h3>
            </div>
        </div>
    </div>

    <div class="awards" id='awards'>
        <h2>Awards</h2>
        <div class="awards__main awards__main--awards">
            <ng-container *ngFor="let award of awardsArray">
                <div class="img__cards">
                    <picture>
                      <source [srcset]="award.imgWebp" type="image/webp">
                      <img [src]="award.imgSrource" [alt]="award.title" loading="lazy" />
                    </picture>
                    <h3>{{ award.title }}</h3>
                </div>
            </ng-container>
        </div>
    </div>
</div>
